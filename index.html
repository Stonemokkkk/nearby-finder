<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>附近設施 Finder</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2563eb;
            --primary-light: #3b82f6;
            --primary-dark: #1d4ed8;
            --secondary: #64748b;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --card-bg: #ffffff;
            --text-primary: #0f172a;
            --text-secondary: #64748b;
            --border: #e2e8f0;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--background);
            min-height: 100vh;
            padding: 16px;
            color: var(--text-primary);
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 24px;
        }

        .header h1 {
            color: white;
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
        }

        /* Cards */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-lg);
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 16px;
        }

        .card-header .icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .card-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        /* Input Groups */
        .input-group {
            margin-bottom: 16px;
        }

        .input-group label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            transition: all 0.2s;
            background: #f8fafc;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
        }

        .input-group input::placeholder {
            color: #94a3b8;
        }

        /* Buttons */
        .btn {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.4);
        }

        .btn-primary:hover {
            box-shadow: 0 6px 20px rgba(37, 99, 235, 0.5);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background: #f1f5f9;
            color: var(--text-primary);
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #e2e8f0;
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Status */
        .status {
            text-align: center;
            font-size: 14px;
            margin-top: 12px;
            padding: 10px;
            border-radius: 10px;
            font-weight: 500;
        }

        .status.error {
            background: #fef2f2;
            color: var(--danger);
        }

        .status.success {
            background: #f0fdf4;
            color: var(--success);
        }

        /* Coordinates Display */
        .coordinates {
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border-radius: 12px;
            padding: 12px 16px;
            margin-top: 12px;
            font-size: 13px;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .coordinates .pin {
            font-size: 16px;
        }

        /* Category Filters */
        .category-filters {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            padding: 4px 0;
            margin-bottom: 16px;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        .category-filters::-webkit-scrollbar {
            display: none;
        }

        .category-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 8px 14px;
            background: #f1f5f9;
            border: 2px solid transparent;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .category-chip:hover {
            background: #e2e8f0;
        }

        .category-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .category-chip .emoji {
            font-size: 16px;
        }

        .category-chip .count {
            background: rgba(0, 0, 0, 0.1);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
        }

        .category-chip.active .count {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Results */
        .results-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .results-header h2 {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .results-count {
            background: #f1f5f9;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 13px;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .result-item {
            background: #f8fafc;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
            transition: all 0.2s;
        }

        .result-item:hover {
            border-color: var(--primary-light);
            box-shadow: var(--shadow);
        }

        .result-item-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 10px;
        }

        .result-item .emoji-badge {
            width: 44px;
            height: 44px;
            background: linear-gradient(135deg, #eff6ff 0%, #dbeafe 100%);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }

        .result-item .info {
            flex: 1;
            min-width: 0;
        }

        .result-item h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .result-item .address {
            font-size: 13px;
            color: var(--text-secondary);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .result-item .distance-badge {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
            color: white;
            padding: 4px 10px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .result-item .additional-info {
            background: white;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--text-secondary);
            line-height: 1.5;
        }

        .result-item .additional-info .info-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }

        .result-item .additional-info .info-row:last-child {
            margin-bottom: 0;
        }

        .result-item .additional-info .info-label {
            color: var(--text-secondary);
        }

        .result-item .additional-info .info-value {
            color: var(--text-primary);
            font-weight: 500;
        }

        .result-item .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .result-item .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 500;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .result-item .action-btn.primary {
            background: var(--primary);
            color: white;
        }

        .result-item .action-btn.primary:hover {
            background: var(--primary-dark);
        }

        .result-item .action-btn.secondary {
            background: #f1f5f9;
            color: var(--text-primary);
        }

        .result-item .action-btn.secondary:hover {
            background: #e2e8f0;
        }

        /* No Results */
        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-secondary);
        }

        .no-results .emoji {
            font-size: 48px;
            margin-bottom: 12px;
        }

        .no-results p {
            font-size: 15px;
        }

        /* Loading */
        .loading {
            display: none;
            text-align: center;
            padding: 30px;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #e2e8f0;
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .loading p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        /* Mobile Optimizations */
        @media (max-width: 480px) {
            body {
                padding: 12px;
            }

            .header h1 {
                font-size: 24px;
            }

            .card {
                padding: 16px;
                border-radius: 16px;
            }

            .result-item {
                padding: 14px;
            }

            .result-item .emoji-badge {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }

        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>🏙️ 附近設施 Finder</h1>
            <p>搵你附近嘅政府設施、停車場、商場</p>
        </div>

        <!-- Location Input Card -->
        <div class="card">
            <div class="card-header">
                <div class="icon">📍</div>
                <h2>輸入位置</h2>
            </div>

            <div class="input-group">
                <label for="lat">緯度 (Latitude)</label>
                <input type="number" id="lat" step="any" placeholder="例如: 22.2818" />
            </div>

            <div class="input-group">
                <label for="lng">經度 (Longitude)</label>
                <input type="number" id="lng" step="any" placeholder="例如: 114.1588" />
            </div>

            <button class="btn btn-primary" id="gpsBtn">
                <span>📱</span> 使用 GPS 定位
            </button>

            <button class="btn btn-secondary" id="searchBtn">
                <span>🔍</span> 搜尋附近設施
            </button>

            <div class="status" id="status"></div>

            <div class="coordinates" id="coordinates" style="display: none;">
                <span class="pin">📌</span>
                <span>當前位置: <span id="coordText"></span></span>
            </div>
        </div>

        <!-- Loading Indicator -->
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>正在搜尋附近設施...</p>
        </div>

        <!-- Results Card -->
        <div class="card" id="resultsCard" style="display: none;">
            <div class="results-header">
                <h2>🎯 附近設施</h2>
                <span class="results-count" id="resultsCount"></span>
            </div>

            <!-- Category Filters -->
            <div class="category-filters" id="categoryFilters"></div>

            <!-- Results List -->
            <div id="resultsList"></div>
        </div>
    </div>

    <script>
        // ==================== Configuration ====================
        const PROXY_BASE = 'https://nearby-finder-proxy.stonemok-business.workers.dev';

        // ==================== Category Definitions ====================
        const CATEGORIES = {
            parking: { emoji: '🅿️', label: '停車場', keywords: ['停車場', '泊車', '停車'] },
            plaza: { emoji: '🏛️', label: '廣場', keywords: ['廣場'] },
            building: { emoji: '🏢', label: '大廈', keywords: ['大廈', '中心', '大樓'] },
            street: { emoji: '🛣️', label: '街道', keywords: ['街', '道', '路', '徑'] },
            mall: { emoji: '🛍️', label: '商場', keywords: ['商場', '購物', '廣場'] },
            hotel: { emoji: '🏨', label: '酒店', keywords: ['酒店', '旅館', 'hotel'] },
            other: { emoji: '📍', label: '其他', keywords: [] }
        };

        // ==================== DOM Elements ====================
        const latInput = document.getElementById('lat');
        const lngInput = document.getElementById('lng');
        const gpsBtn = document.getElementById('gpsBtn');
        const searchBtn = document.getElementById('searchBtn');
        const statusDiv = document.getElementById('status');
        const coordinatesDiv = document.getElementById('coordinates');
        const coordText = document.getElementById('coordText');
        const loadingDiv = document.getElementById('loading');
        const resultsCard = document.getElementById('resultsCard');
        const resultsList = document.getElementById('resultsList');
        const resultsCount = document.getElementById('resultsCount');
        const categoryFilters = document.getElementById('categoryFilters');

        // ==================== State ====================
        let currentLat = null;
        let currentLng = null;
        let allFacilities = [];
        let activeCategory = 'all';

        // ==================== GPS Button ====================
        gpsBtn.addEventListener('click', () => {
            if (!navigator.geolocation) {
                showStatus('你嘅瀏覽器唔支援 GPS 定位', 'error');
                return;
            }

            showStatus('正在獲取位置...', '');
            gpsBtn.disabled = true;

            navigator.geolocation.getCurrentPosition(
                (position) => {
                    currentLat = position.coords.latitude;
                    currentLng = position.coords.longitude;

                    latInput.value = currentLat.toFixed(6);
                    lngInput.value = currentLng.toFixed(6);

                    coordText.textContent = `${currentLat.toFixed(6)}, ${currentLng.toFixed(6)}`;
                    coordinatesDiv.style.display = 'flex';

                    showStatus('位置獲取成功！', 'success');
                    gpsBtn.disabled = false;
                },
                (error) => {
                    let msg = '無法獲取位置';
                    switch (error.code) {
                        case error.PERMISSION_DENIED:
                            msg = '用戶拒絕了定位請求';
                            break;
                        case error.POSITION_UNAVAILABLE:
                            msg = '位置信息不可用';
                            break;
                        case error.TIMEOUT:
                            msg = '定位請求超時';
                            break;
                    }
                    showStatus(msg, 'error');
                    gpsBtn.disabled = false;
                },
                {
                    enableHighAccuracy: true,
                    timeout: 10000,
                    maximumAge: 0
                }
            );
        });

        // ==================== Search Button ====================
        searchBtn.addEventListener('click', async () => {
            const lat = parseFloat(latInput.value);
            const lng = parseFloat(lngInput.value);

            if (isNaN(lat) || isNaN(lng)) {
                showStatus('請輸入有效嘅緯度同經度', 'error');
                return;
            }

            if (lat < 22.15 || lat > 22.56 || lng < 113.82 || lng > 114.44) {
                showStatus('座標似乎唔喺香港範圍內', 'error');
                return;
            }

            currentLat = lat;
            currentLng = lng;

            coordText.textContent = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
            coordinatesDiv.style.display = 'flex';

            await searchNearby(lat, lng);
        });

        // ==================== Search Nearby ====================
        async function searchNearby(lat, lng) {
            showLoading(true);
            showStatus('', '');

            try {
                const nearbyUrl = `${PROXY_BASE}/nearby?lat=${lat}&lng=${lng}&lang=zh`;
                const nearbyResponse = await fetch(nearbyUrl);

                if (!nearbyResponse.ok) {
                    throw new Error(`搜尋失敗: ${nearbyResponse.status}`);
                }

                const nearbyData = await nearbyResponse.json();
                console.log('Nearby response:', nearbyData);

                // Process facilities
                allFacilities = nearbyData.map(facility => {
                    const facLat = facility.wgsLat || 0;
                    const facLng = facility.wgsLng || 0;
                    const distance = getDistance(lat, lng, facLat, facLng);
                    const category = categorizeFacility(facility.name);

                    return {
                        ...facility,
                        facLat,
                        facLng,
                        distance,
                        category
                    };
                });

                // Sort by distance
                allFacilities.sort((a, b) => a.distance - b.distance);

                // Render category filters
                renderCategoryFilters();

                // Render results
                renderResults();

            } catch (error) {
                console.error('Search error:', error);
                showStatus(`搜尋失敗: ${error.message}`, 'error');
                resultsCard.style.display = 'none';
            } finally {
                showLoading(false);
            }
        }

        // ==================== Categorize Facility ====================
        function categorizeFacility(name) {
            if (!name) return 'other';

            const lowerName = name.toLowerCase();

            for (const [key, category] of Object.entries(CATEGORIES)) {
                if (key === 'other') continue;
                if (category.keywords.some(keyword => lowerName.includes(keyword))) {
                    return key;
                }
            }

            return 'other';
        }

        // ==================== Render Category Filters ====================
        function renderCategoryFilters() {
            // Count facilities per category
            const counts = { all: allFacilities.length };
            for (const key of Object.keys(CATEGORIES)) {
                counts[key] = 0;
            }

            allFacilities.forEach(f => {
                counts[f.category]++;
            });

            // Build HTML
            let html = `
                <div class="category-chip ${activeCategory === 'all' ? 'active' : ''}" data-category="all">
                    <span class="emoji">📍</span>
                    <span>全部</span>
                    <span class="count">${counts.all}</span>
                </div>
            `;

            for (const [key, category] of Object.entries(CATEGORIES)) {
                if (counts[key] === 0) continue;
                html += `
                    <div class="category-chip ${activeCategory === key ? 'active' : ''}" data-category="${key}">
                        <span class="emoji">${category.emoji}</span>
                        <span>${category.label}</span>
                        <span class="count">${counts[key]}</span>
                    </div>
                `;
            }

            categoryFilters.innerHTML = html;

            // Add click handlers
            categoryFilters.querySelectorAll('.category-chip').forEach(chip => {
                chip.addEventListener('click', () => {
                    activeCategory = chip.dataset.category;
                    categoryFilters.querySelectorAll('.category-chip').forEach(c => c.classList.remove('active'));
                    chip.classList.add('active');
                    renderResults();
                });
            });
        }

        // ==================== Render Results ====================
        function renderResults() {
            resultsList.innerHTML = '';

            // Filter by category
            const filtered = activeCategory === 'all'
                ? allFacilities
                : allFacilities.filter(f => f.category === activeCategory);

            if (filtered.length === 0) {
                resultsList.innerHTML = `
                    <div class="no-results">
                        <div class="emoji">🔍</div>
                        <p>呢個分類冇搵到設施</p>
                    </div>
                `;
                resultsCount.textContent = '0 個';
                return;
            }

            resultsCount.textContent = `${filtered.length} 個`;

            // Render each facility
            filtered.forEach(facility => {
                const name = facility.name || '未知設施';
                const address = facility.address || '';
                const distance = facility.distance;
                const category = CATEGORIES[facility.category] || CATEGORIES.other;
                const mapsUrl = `https://www.google.com/maps?q=${facility.facLat},${facility.facLng}`;

                // Get additional info
                let additionalInfoHtml = '';
                if (facility.additionalInfoKey && facility.additionalInfoValue) {
                    const infoRows = facility.additionalInfoKey.map((key, i) => {
                        const value = facility.additionalInfoValue[i] || '';
                        // Clean up HTML tags
                        const cleanValue = value.replace(/<br\/>/g, ' ').replace(/<[^>]*>/g, '');
                        return `
                            <div class="info-row">
                                <span class="info-label">${escapeHtml(key)}:</span>
                                <span class="info-value">${escapeHtml(cleanValue)}</span>
                            </div>
                        `;
                    }).join('');

                    additionalInfoHtml = `<div class="additional-info">${infoRows}</div>`;
                }

                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <div class="result-item-header">
                        <div class="emoji-badge">${category.emoji}</div>
                        <div class="info">
                            <h3>${escapeHtml(name)}</h3>
                            ${address ? `<div class="address">📍 ${escapeHtml(address)}</div>` : ''}
                        </div>
                        <div class="distance-badge">${distance.toFixed(0)}m</div>
                    </div>
                    ${additionalInfoHtml}
                    <div class="actions">
                        <a href="${mapsUrl}" target="_blank" rel="noopener" class="action-btn primary" style="text-decoration: none;">
                            <span>🗺️</span> 在地圖中查看
                        </a>
                    </div>
                `;
                resultsList.appendChild(item);
            });
        }

        // ==================== Helper Functions ====================

        // Haversine formula for distance calculation
        function getDistance(lat1, lng1, lat2, lng2) {
            const R = 6371000; // Earth's radius in meters
            const dLat = toRad(lat2 - lat1);
            const dLng = toRad(lng2 - lng1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) *
                      Math.sin(dLng/2) * Math.sin(dLng/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

        function toRad(deg) {
            return deg * (Math.PI / 180);
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showStatus(msg, type) {
            statusDiv.textContent = msg;
            statusDiv.className = 'status' + (type ? ' ' + type : '');
        }

        function showLoading(show) {
            loadingDiv.className = show ? 'loading show' : 'loading';
            searchBtn.disabled = show;
            gpsBtn.disabled = show;
        }
    </script>
</body>
</html>
